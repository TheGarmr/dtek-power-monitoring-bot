workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never

stages:
  - prepare
  - build
  - release

variables:
  VERSION_MAJOR: "1"
  DOCKER_IMAGE_NAME: "dtek-power-monitoring-bot"
  GIT_DEPTH: "0"

prepare_version:
  stage: prepare
  image: alpine:3.21
  interruptible: true
  before_script:
    - apk add --no-cache git
  script:
    - |
      set -eu
      git fetch --force --tags

      CURRENT_MINOR="$(
        git tag --list "v${VERSION_MAJOR}.*" \
          | sed -nE "s/^v${VERSION_MAJOR}\.([0-9]+)$/\1/p" \
          | sort -n \
          | tail -n 1
      )"

      if [ -z "$CURRENT_MINOR" ]; then
        NEW_MINOR=0
        PREVIOUS_TAG=""
      else
        NEW_MINOR=$((CURRENT_MINOR + 1))
        PREVIOUS_TAG="v${VERSION_MAJOR}.${CURRENT_MINOR}"
      fi

      NEW_VERSION="v${VERSION_MAJOR}.${NEW_MINOR}"
      printf 'NEW_VERSION=%s\nPREVIOUS_TAG=%s\n' \
        "$NEW_VERSION" "$PREVIOUS_TAG" > release.env

      if [ -n "$PREVIOUS_TAG" ]; then
        git log --no-merges --pretty=format:'- %s (`%h`)' \
          "${PREVIOUS_TAG}..${CI_COMMIT_SHA}" > release-notes.md
      else
        git log --no-merges --pretty=format:'- %s (`%h`)' \
          "$CI_COMMIT_SHA" > release-notes.md
      fi

      if [ ! -s release-notes.md ]; then
        printf '%s\n' '- No commit messages since the previous release.' \
          > release-notes.md
      fi

      echo "Prepared ${NEW_VERSION}"
  artifacts:
    expire_in: 1 week
    paths:
      - release-notes.md
    reports:
      dotenv: release.env

build_image:
  stage: build
  image: docker:27.5.1-cli
  interruptible: true
  needs:
    - job: prepare_version
      artifacts: true
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  services:
    - name: docker:27.5.1-dind
      alias: docker
      command:
        - "--tls=false"
  before_script:
    - |
      set -eu
      : "${PRIVATE_DOCKER_REGISTRY_URL:?PRIVATE_DOCKER_REGISTRY_URL is required}"
      : "${PRIVATE_DOCKER_REGISTRY_USERNAME:?PRIVATE_DOCKER_REGISTRY_USERNAME is required}"
      : "${PRIVATE_DOCKER_REGISTRY_PASSWORD:?PRIVATE_DOCKER_REGISTRY_PASSWORD is required}"
      if ! printf '%s' "$PRIVATE_DOCKER_REGISTRY_PASSWORD" \
        | docker login \
          --username "$PRIVATE_DOCKER_REGISTRY_USERNAME" \
          --password-stdin "$PRIVATE_DOCKER_REGISTRY_URL" \
          >/dev/null 2>&1; then
        echo "Registry login failed"
        exit 1
      fi
  script:
    - |
      set -eu
      DOCKER_IMAGE="${PRIVATE_DOCKER_REGISTRY_URL%/}/${DOCKER_IMAGE_NAME}"
      docker build --pull \
        --tag "${DOCKER_IMAGE}:${NEW_VERSION}" \
        --tag "${DOCKER_IMAGE}:latest" \
        .
      docker push "${DOCKER_IMAGE}:${NEW_VERSION}"
      docker push "${DOCKER_IMAGE}:latest"

publish_release:
  stage: release
  image: alpine:3.21
  interruptible: false
  resource_group: automated-release
  needs:
    - job: prepare_version
      artifacts: true
    - job: build_image
  before_script:
    - apk add --no-cache curl
  script:
    - |
      set -eu
      test -n "$NEW_VERSION"
      test -s release-notes.md
      echo "Publishing GitLab Release ${NEW_VERSION}"
      curl --fail-with-body --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --form "name=Release ${NEW_VERSION}" \
        --form "tag_name=${NEW_VERSION}" \
        --form "ref=${CI_COMMIT_SHA}" \
        --form "description=<release-notes.md" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
