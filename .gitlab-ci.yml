include:
  - project: "devops/ci-cd-templates"
    ref: main
    file: "/release/workflow.yaml"

stages:
  - prepare
  - build
  - release

variables:
  DOCKER_IMAGE_NAME: "dtek-power-monitoring-bot"

prepare_version:
  extends: .prepare_version

build_image:
  stage: build
  image: docker:27.5.1-cli
  interruptible: true
  needs:
    - job: prepare_version
      artifacts: true
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  services:
    - name: docker:27.5.1-dind
      alias: docker
      command:
        - "--tls=false"
  before_script:
    - |
      set -eu
      : "${PRIVATE_DOCKER_REGISTRY_URL:?PRIVATE_DOCKER_REGISTRY_URL is required}"
      : "${PRIVATE_DOCKER_REGISTRY_USERNAME:?PRIVATE_DOCKER_REGISTRY_USERNAME is required}"
      : "${PRIVATE_DOCKER_REGISTRY_PASSWORD:?PRIVATE_DOCKER_REGISTRY_PASSWORD is required}"
      if ! printf '%s' "$PRIVATE_DOCKER_REGISTRY_PASSWORD" \
        | docker login \
          --username "$PRIVATE_DOCKER_REGISTRY_USERNAME" \
          --password-stdin "$PRIVATE_DOCKER_REGISTRY_URL" \
          >/dev/null 2>&1; then
        echo "Registry login failed"
        exit 1
      fi
  script:
    - |
      set -eu
      DOCKER_IMAGE="${PRIVATE_DOCKER_REGISTRY_URL%/}/${DOCKER_IMAGE_NAME}"
      docker build --pull \
        --tag "${DOCKER_IMAGE}:${NEW_VERSION}" \
        --tag "${DOCKER_IMAGE}:latest" \
        .
      docker push "${DOCKER_IMAGE}:${NEW_VERSION}"
      docker push "${DOCKER_IMAGE}:latest"

publish_release:
  extends: .publish_release
  needs:
    - job: prepare_version
      artifacts: true
    - job: build_image
